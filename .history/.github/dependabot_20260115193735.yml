version: 2
updates:
  # NuGet packages for all .NET projects
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Moscow"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"
      include: "scope"
    labels:
      - "dependencies"
      - "automated"
    groups:
      # Group ASP.NET Core packages
      aspnetcore:
        patterns:
          - "Microsoft.AspNetCore.*"
        update-types:
          - "minor"
          - "patch"
      # Group Entity Framework packages
      entityframework:
        patterns:
          - "Microsoft.EntityFrameworkCore.*"
          - "Npgsql.EntityFrameworkCore.*"
        update-types:
          - "minor"
          - "patch"
      # Group Microsoft.Extensions packages
      extensions:
        patterns:
          - "Microsoft.Extensions.*"
        update-types:
          - "minor"
          - "patch"
      # Group RabbitMQ packages
      rabbitmq:
        patterns:
          - "RabbitMQ.Client"
        update-types:
          - "minor"
          - "patch"
      # Group NLog packages
      logging:
        patterns:
          - "NLog*"
        update-types:
          - "minor"
          - "patch"

  # Docker base images
  - package-ecosystem: "docker"
    directory: "/DocumentXmlProcessorAPI"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Moscow"
    open-pull-requests-limit: 5
    labels:
      - "docker"
      - "dependencies"

  - package-ecosystem: "docker"
    directory: "/XsltProcessor"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Moscow"
    open-pull-requests-limit: 5
    labels:
      - "docker"
      - "dependencies"

  - package-ecosystem: "docker"
    directory: "/PdfProcessor"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Moscow"
    open-pull-requests-limit: 5
    labels:
      - "docker"
      - "dependencies"

  - package-ecosystem: "docker"
    directory: "/OldFIleWatcher"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Moscow"
    open-pull-requests-limit: 5
    labels:
      - "docker"
      - "dependencies"