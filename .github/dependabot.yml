# Конфигурация Dependabot для автоматического обновления зависимостей
# Этот файл настраивает GitHub Dependabot для автоматического создания PR с обновлениями зависимостей
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates

# Еженедельные проверки по понедельникам в 9:00 MSK
# Группировка обновлений по типам пакетов для оптимизации
# Автоматические метки для удобной фильтрации PR
# Ограничение количества открытых PR (10 для NuGet, 5 для Docker)
# Мониторинг Docker образов в каждом сервисе

version: 2
updates:
  # NuGet пакеты для всех .NET проектов
  # Автоматически проверяет и обновляет NuGet зависимости во всех .csproj файлах
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Moscow"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"
      include: "scope"
    labels:
      - "dependencies"
      - "automated"
    # Группировка обновлений по типам пакетов для уменьшения количества PR
    groups:
      # Group ASP.NET Core packages
      aspnetcore:
        patterns:
          - "Microsoft.AspNetCore.*"
        update-types:
          - "minor"
          - "patch"
      # Group Entity Framework packages
      entityframework:
        patterns:
          - "Microsoft.EntityFrameworkCore.*"
          - "Npgsql.EntityFrameworkCore.*"
        update-types:
          - "minor"
          - "patch"
      # Group Microsoft.Extensions packages
      extensions:
        patterns:
          - "Microsoft.Extensions.*"
        update-types:
          - "minor"
          - "patch"
      # Group RabbitMQ packages
      rabbitmq:
        patterns:
          - "RabbitMQ.Client"
        update-types:
          - "minor"
          - "patch"
      # Group NLog packages
      logging:
        patterns:
          - "NLog*"
        update-types:
          - "minor"
          - "patch"

  # Docker базовые образы для всех сервисов
  # Автоматически обновляет базовые образы .NET в Dockerfiles
  - package-ecosystem: "docker"
    directory: "/DocumentXmlProcessorAPI"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Moscow"
    open-pull-requests-limit: 5
    labels:
      - "docker"
      - "dependencies"

  - package-ecosystem: "docker"
    directory: "/XsltProcessor"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Moscow"
    open-pull-requests-limit: 5
    labels:
      - "docker"
      - "dependencies"

  - package-ecosystem: "docker"
    directory: "/PdfProcessor"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Moscow"
    open-pull-requests-limit: 5
    labels:
      - "docker"
      - "dependencies"

  - package-ecosystem: "docker"
    directory: "/OldFIleWatcher"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Moscow"
    open-pull-requests-limit: 5
    labels:
      - "docker"
      - "dependencies"


