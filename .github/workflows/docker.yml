name: Build and Push Docker Images

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Получаем версию из файла VERSION
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      is_tag: ${{ steps.version.outputs.IS_TAG }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug info
        run: |
          echo "Git ref: ${{ github.ref }}"
          echo "Event: ${{ github.event_name }}"
          echo "VERSION content:"
          cat VERSION

      - name: Read version
        id: version
        run: |
          VERSION=$(cat VERSION)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "IS_TAG=true" >> $GITHUB_OUTPUT
            echo ">>> TAG DETECTED - will PUSH images to ghcr.io"
          else
            echo "IS_TAG=false" >> $GITHUB_OUTPUT
            echo ">>> NO TAG - will NOT push images"
          fi

  # Сборка всех сервисов
  build:
    needs: get-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - file_watcher
          - pdf_processor
          - xslt_processor
          - api_processor
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug
        run: |
          echo "Building: ${{ matrix.service }}"
          echo "Is tag: ${{ needs.get-version.outputs.is_tag }}"
          echo "Version: ${{ needs.get-version.outputs.version }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: needs.get-version.outputs.is_tag == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile-${{ matrix.service }}
          push: false
          load: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}:${{ needs.get-version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_CONFIGURATION=Release

      - name: Push to registry
        if: needs.get-version.outputs.is_tag == 'true'
        run: |
          echo "Pushing ${{ matrix.service }}:${{ needs.get-version.outputs.version }}"
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}:${{ needs.get-version.outputs.version }}

  # Обновление образа latest после успешной сборки
  update-latest:
    needs: [get-version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    if: needs.get-version.outputs.is_tag == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and retag images as latest
        run: |
          VERSION=${{ needs.get-version.outputs.version }}
          echo "Updating latest for version $VERSION"
          
          for service in file_watcher pdf_processor xslt_processor api_processor; do
            echo "Processing $service"
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/$service:$VERSION
            docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/$service:$VERSION \
                       ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/$service:latest
            docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/$service:latest
          done

  # Уведомление о завершении
  notify:
    needs: [get-version, build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Success notification
        if: needs.get-version.outputs.is_tag == 'true' && needs.build.result == 'success'
        run: echo "✅ Docker images successfully built and pushed!"

      - name: Failure notification
        if: needs.build.result == 'failure'
        run: echo "❌ Build failed! Check GitHub Actions logs."
